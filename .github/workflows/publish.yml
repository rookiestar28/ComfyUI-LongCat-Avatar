name: Publish to Comfy Registry

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "pyproject.toml"

permissions:
  contents: read

jobs:
  publish-node:
    name: Publish Custom Node to Registry
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'rookiestar28' }}
    permissions:
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Validate Comfy Registry metadata
        run: python scripts/validate_comfy_registry_metadata.py --require-finalized

      - name: Publish Custom Node
        # Pinned from Comfy-Org/publish-node-action main on 2026-06-09.
        uses: Comfy-Org/publish-node-action@d2366e7abb6ab16f3bb03e3520ae25c8cf749bc9
        with:
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
